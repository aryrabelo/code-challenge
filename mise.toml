# mise toolchain pin — `mise install` then `bundle install`.
# Keeps the Ruby version reproducible across machines/CI instead of relying on
# the host's system Ruby (which here is an old 2.6).
[tools]
ruby = "3.3.6"

[env]
# put ./bin on PATH inside the project (bin/verify, etc.)
_.path = ["{{config_root}}/bin"]

[tasks.verify]
description = "Offline correctness proof against the official expected-array.json"
run = "ruby bin/verify"

[tasks.test]
description = "Run the RSpec suite"
run = "bundle exec rspec"
