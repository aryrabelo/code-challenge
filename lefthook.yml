# Lefthook — git hooks that enforce the TDD gate.
#
# A red suite cannot be committed or pushed: every commit runs the tests, every
# push runs them again. Install the hooks once with `lefthook install`.
#
# `bin/rspec-if-available` runs the full RSpec suite when Bundler/RSpec are set
# up, and falls back to the dependency-free `bin/verify` oracle check otherwise,
# so the gate is always meaningful.

pre-commit:
  parallel: false
  commands:
    tests:
      run: bin/rspec-if-available
      fail_text: "Tests are RED — write/fix the failing spec before committing (TDD)."

pre-push:
  commands:
    tests:
      run: bin/rspec-if-available
      fail_text: "Tests are RED — do not push a broken suite."
